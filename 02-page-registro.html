<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>registro de usuarios</title>
    <link rel="stylesheet" href="02-stylos-css/02-page.css">
</head>
<body>
   <p>registro de usuarios</p>
  <form class="formato-01">
    <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre"><br>
    <input type="email" id="email" name="email" placeholder="Ingrese su correo electrónico"><br>
    <label>Tipo de documento</label>
<select name="tipo_documento" id="tipo-documento">
  <option value="c.c.">C.C.</option>
  <option value="pasaporte">Pasaporte</option>
  <option value="cedula">C.E.</option>
  <option value="ppt">ppt.</option>
</select>
<input type="text" id="numero_documento" name="numero de documento" placeholder="Ingrese tu documento"><br>
    <label>fecha de nacimiento</label>
    <input type="date" id="fecha" name="fecha">
    <input type="submit" value="Enviar" id="boton">
  </form>
  
</body>
</html>
